global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "alert.rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "node_exporter"
    static_configs:
      - targets: ["172.31.14.47:9100"]
        labels:
          instance: "instance-2"
          env: "production"
  - job_name: "flask_app"
    static_configs:
      - targets: ["172.31.14.47:5000"]
        labels:
          instance: "flask-app"
          env: "production"
